<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SEO + GEO Audit Report</title>
<style>
  :root { --bg:#0b0d10; --card:#15181d; --line:#262b33; --fg:#e8edf2; --mut:#8b95a3;
    --a:#3ddc84; --b:#7ee787; --c:#f2cc60; --d:#f0883e; --e:#f85149; --f:#da3633; }
  * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--fg);
    font:15px/1.55 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:880px; margin:0 auto; padding:40px 20px 80px; }
  h1 { font-size:22px; margin:0 0 4px; } .sub { color:var(--mut); margin:0 0 28px; word-break:break-all; }
  .grade { display:flex; gap:24px; align-items:center; background:var(--card);
    border:1px solid var(--line); border-radius:14px; padding:24px; margin-bottom:24px; }
  .badge { width:96px; height:96px; border-radius:50%; display:grid; place-items:center;
    font-size:44px; font-weight:800; color:#0b0d10; flex:none; }
  .split { color:var(--mut); font-size:14px; } .split b { color:var(--fg); }
  .cats { display:grid; gap:8px; margin:24px 0; }
  .cat { display:grid; grid-template-columns:160px 1fr 42px; gap:12px; align-items:center; }
  .cat .name { color:var(--mut); font-size:13px; } .track { background:#0b0d10; border-radius:6px; height:10px; overflow:hidden; }
  .fill { height:100%; border-radius:6px; } .val { text-align:right; font-variant-numeric:tabular-nums; font-size:13px; }
  h2 { font-size:15px; margin:28px 0 12px; color:var(--mut); text-transform:uppercase; letter-spacing:.04em; }
  .fix { background:var(--card); border:1px solid var(--line); border-left-width:4px; border-radius:10px;
    padding:12px 16px; margin-bottom:8px; }
  .fix .sev { font-size:11px; font-weight:700; letter-spacing:.05em; }
  .FAIL { border-left-color:var(--f); } .FAIL .sev { color:var(--f); }
  .WARN { border-left-color:var(--c); } .WARN .sev { color:var(--c); }
  .fix .id { color:var(--mut); font-size:12px; } .foot { color:var(--mut); font-size:12px; margin-top:40px; text-align:center; }
  a { color:var(--b); }
</style>
</head>
<body>
<div class="wrap">
  <h1>SEO + GEO Audit</h1>
  <p class="sub" id="url"></p>
  <div class="grade">
    <div class="badge" id="badge"></div>
    <div>
      <div style="font-size:28px;font-weight:700" id="finalScore"></div>
      <div class="split" id="split"></div>
    </div>
  </div>
  <h2>Score by category</h2>
  <div class="cats" id="cats"></div>
  <h2>Prioritized fixes</h2>
  <div id="fixes"></div>
  <p class="foot">Generated by <a href="https://github.com/OndrejKnedla/seo-geo-playbook-ok">seo-geo-playbook-ok</a>.
  Foundational score is deterministic; intelligence score is the agent's 6-dimension rubric.</p>
</div>
<script>
// Replace the placeholder token below with the audit JSON object (and optionally add an
// intelligenceScore field to scoring). The token appears exactly once, on the next line.
const REPORT = __REPORT_JSON__;
const colorFor = g => ({A:'--a',B:'--b',C:'--c',D:'--d',E:'--e',F:'--f'}[g]||'--mut');
const cssv = v => getComputedStyle(document.documentElement).getPropertyValue(v);
const found = REPORT.scoring.foundationalScore;
const intel = REPORT.scoring.intelligenceScore ?? null;
const final = intel==null ? found : Math.round(0.5*found + 0.5*intel);
const grade = final>=90?'A':final>=80?'B':final>=70?'C':final>=60?'D':final>=50?'E':'F';
document.getElementById('url').textContent = REPORT.meta.url + ', ' + REPORT.meta.crawledPages + ' pages crawled';
const badge = document.getElementById('badge'); badge.textContent = grade;
badge.style.background = cssv(colorFor(grade));
document.getElementById('finalScore').textContent = final + ' / 100';
document.getElementById('split').innerHTML = intel==null
  ? 'Foundational <b>'+found+'</b> (add the intelligence rubric for the final grade)'
  : 'Foundational <b>'+found+'</b> + Intelligence <b>'+intel+'</b>';
const cats = document.getElementById('cats');
REPORT.scoring.categories.forEach(c => {
  const g = c.score>=90?'A':c.score>=80?'B':c.score>=70?'C':c.score>=60?'D':c.score>=50?'E':'F';
  const el = document.createElement('div'); el.className='cat';
  el.innerHTML = '<span class="name">'+c.name+'</span><div class="track"><div class="fill" style="width:'+c.score+'%;background:'+cssv(colorFor(g))+'"></div></div><span class="val">'+c.score+'</span>';
  cats.appendChild(el);
});
const fixes = document.getElementById('fixes');
(REPORT.prioritizedFixes||[]).forEach(f => {
  const el = document.createElement('div'); el.className='fix '+f.severity;
  el.innerHTML = '<span class="sev">'+f.severity+'</span> &nbsp;<span class="id">['+f.category+'] '+f.id+'</span><div>'+f.detail+'</div>';
  fixes.appendChild(el);
});
</script>
</body>
</html>
